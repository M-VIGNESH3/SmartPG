apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: smartpg-gateway
  namespace: smartpg-prod
  labels:
    project: smartpg
    environment: production
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

name: CI/CD Pipeline - Develop

on:
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sast-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-scan:
    needs: [sonarqube, sast-scan, secret-scan]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      security-events: write
    strategy:
      matrix:
        service: [frontend, tenant-service, payment-service, mess-service, complaint-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:dev-latest
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-dev:
    needs: [build-and-scan]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - name: Set KUBECONFIG
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config
      - name: Apply Dev Namespace and ConfigMap
        run: |
          kubectl apply -f k8s-manifests/dev/namespace.yaml
          kubectl apply -f k8s-manifests/dev/configmap.yaml
      - name: Create Secrets
        run: |
          kubectl create secret generic smartpg-secrets \
            --from-literal=MONGO_URI="mongodb://admin:${{ secrets.MONGO_PASSWORD }}@mongodb-service:27017/smartpg_db?authSource=admin" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --namespace=smartpg-dev \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply Base Manifests
        run: |
          kubectl apply -f k8s-manifests/base/mongodb/
          kubectl apply -f k8s-manifests/base/tenant-service/
          kubectl apply -f k8s-manifests/base/payment-service/
          kubectl apply -f k8s-manifests/base/mess-service/
          kubectl apply -f k8s-manifests/base/complaint-service/
          kubectl apply -f k8s-manifests/base/notification-service/
          kubectl apply -f k8s-manifests/base/frontend/
      - name: Update Images
        run: |
          kubectl set image deployment/tenant-service tenant-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-tenant-service:${{ github.sha }} -n smartpg-dev
          kubectl set image deployment/payment-service payment-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-payment-service:${{ github.sha }} -n smartpg-dev
          kubectl set image deployment/mess-service mess-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mess-service:${{ github.sha }} -n smartpg-dev
          kubectl set image deployment/complaint-service complaint-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-complaint-service:${{ github.sha }} -n smartpg-dev
          kubectl set image deployment/notification-service notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notification-service:${{ github.sha }} -n smartpg-dev
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} -n smartpg-dev
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tenant-service --timeout=300s -n smartpg-dev
          kubectl rollout status deployment/payment-service --timeout=300s -n smartpg-dev
          kubectl rollout status deployment/mess-service --timeout=300s -n smartpg-dev
          kubectl rollout status deployment/complaint-service --timeout=300s -n smartpg-dev
          kubectl rollout status deployment/notification-service --timeout=300s -n smartpg-dev
          kubectl rollout status deployment/frontend --timeout=300s -n smartpg-dev

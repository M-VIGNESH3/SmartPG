worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    server {
        listen 80;
        server_name localhost;
        
        root /usr/share/nginx/html;
        index index.html;
        
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API Reverse Proxy
        location /api/auth/ {
            proxy_pass http://tenant-service:4001;
        }
        location /api/tenants {
            proxy_pass http://tenant-service:4001;
        }
        location /api/rooms {
            proxy_pass http://tenant-service:4001;
        }
        location /api/payments {
            proxy_pass http://payment-service:4002;
        }
        location /api/menu {
            proxy_pass http://mess-service:4003;
        }
        location /api/orders {
            proxy_pass http://mess-service:4003;
        }
        location /api/complaints {
            proxy_pass http://complaint-service:4004;
        }
        location /api/notifications {
            proxy_pass http://notification-service:4005;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
